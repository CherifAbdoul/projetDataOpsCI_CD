name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest pytest-cov

    - name: Run Unit Tests
      run: |
        python -m pytest test_main.py -v --cov=main --cov-report=xml

    - name: Run Integration Tests
      run: |
        echo "Running integration tests..."
        # For this simple app, we can simulate integration tests
        python -c "
        from main import sum_values
        result = sum_values([10, 20, 30])
        assert result == 60, f'Expected 60, got {result}'
        print('Integration tests passed')
        "

    - name: Run Non-Regression Tests
      run: |
        echo "Running non-regression tests..."
        # Compare current behavior with expected baseline
        python -c "
        from main import sum_values
        # Baseline tests that should never change
        assert sum_values([1,2,3]) == 6, 'Regression detected in sum_values'
        assert sum_values([]) == 0, 'Regression in empty list handling'
        print('Non-regression tests passed')
        "

    - name: Code Analysis with SonarCloud
      if: github.event_name == 'push' || github.event_name == 'pull_request'
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=your-project-key
          -Dsonar.organization=your-org
          -Dsonar.python.coverage.reportPaths=coverage.xml
          -Dsonar.sources=.

  deploy-preprod:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build Artifact
      run: |
        echo "Building Python package..."
        python -m pip install build
        python -m build
        echo "Build completed successfully"

    - name: Deploy to Preprod
      run: |
        echo "Deploying to Preprod environment..."
        # Example deployment steps - customize for your target (Heroku, AWS, Docker, etc.)
        echo "Application successfully deployed to Preprod!"
        
        # Example: Run smoke test in preprod
        echo "Running smoke test..."
        python -c "
        from main import sum_values
        result = sum_values([100, 200])
        print(f'Smoke test result: {result}')
        assert result == 300
        "
        echo "Preprod deployment and verification successful"